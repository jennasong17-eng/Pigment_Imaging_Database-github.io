<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Pigment Image Gallery</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Image Archive</h1>
</header>

<div class="upload">

<input type="file" id="imageInput">
<input type="text" id="titleInput" placeholder="Image title">
<textarea id="descInput" placeholder="Image description"></textarea>

<button id="uploadBtn">Upload</button>

</div>

<div id="gallery" class="gallery"></div>

<div id="modal" class="modal">
<span id="closeBtn">&times;</span>
<img id="modalImg">
<h2 id="modalTitle"></h2>
<p id="modalDesc"></p>
</div>

<script src="script.js"></script>

</body>
</html>
